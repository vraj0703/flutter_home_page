<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vishal Raj — Portfolio</title>
    <meta name="description" content="Platform Architect. System Thinker. AI-Native Builder." />
    <!-- Fonts loaded via @font-face in index.css — shared with Flutter -->

    <!--
      NOTE: Preload hints for Flutter assets (canvaskit.wasm, main.dart.js) are NOT
      useful while Flutter runs inside an iframe — the iframe has its own document
      context and can't use the parent page's preloaded resources. Preload hints
      will be re-added when FlutterHost (hostElement mode) is activated.
    -->

    <!--
      Flutter↔React interop namespace.
      Currently Flutter runs in an iframe (postMessage bridge).
      FlutterHost.tsx (hostElement mode) is ready but requires a Flutter rebuild
      with CanvasLifecyclePort(useDirectInterop: true) to fully eliminate the iframe.
    -->
    <script>
      window._flutterToReact = {
        onLoading: function() {},
        onReady: function() {},
        onHandoff: function() {},
        onError: function() {},
      };
      window._registerFlutterCallback = function() {};
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
