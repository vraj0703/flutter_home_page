<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vishal Raj — Portfolio</title>
    <meta name="description" content="Platform Architect. System Thinker. AI-Native Builder." />
    <!-- Fonts loaded via @font-face in index.css — shared with Flutter -->

    <!--
      NOTE: Preload hints for Flutter assets (canvaskit.wasm, main.dart.js) are NOT
      useful while Flutter runs inside an iframe — the iframe has its own document
      context and can't use the parent page's preloaded resources. Preload hints
      will be re-added when FlutterHost (hostElement mode) is activated.
    -->

    <!--
      Flutter↔React interop namespace.
      Currently Flutter runs in an iframe (postMessage bridge).
      FlutterHost.tsx (hostElement mode) is ready but requires a Flutter rebuild
      with CanvasLifecyclePort(useDirectInterop: true) to fully eliminate the iframe.
    -->
    <script>
      window._flutterToReact = {
        onLoading: function() {},
        onReady: function() {},
        onHandoff: function() {},
        onError: function() {},
      };
      window._registerFlutterCallback = function() {};

      // ── Stale service worker cleanup ───────────────────────────────
      // The pre-fix deploy shipped without public/flutter/index.html, so
      // Firebase's `**` rewrite served React's index.html in response to
      // the iframe's /flutter/index.html request. Users who visited
      // during that window got Flutter's SW installed with the WRONG
      // cached response — next visit, SW serves the cached React bundle,
      // iframe runs React recursively, preloader hangs at 20%. Force-
      // unregister the Flutter SW and clear its caches on every page
      // load until we're confident the stale population is gone.
      // Safe to remove this block a week or two after deploy lands.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) {
            if (r.scope.indexOf('/flutter/') !== -1) r.unregister();
          });
        }).catch(function() {});
        if ('caches' in window) {
          caches.keys().then(function(keys) {
            keys.forEach(function(k) {
              if (k.indexOf('flutter') !== -1) caches.delete(k);
            });
          }).catch(function() {});
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
